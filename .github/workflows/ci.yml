name: ci

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff
        run: python -m pip install --upgrade pip ruff
      - name: Format (check)
        run: ruff format --check .
      - name: Lint
        run: ruff check .
      - name: Syntax check
        run: python -m compileall .
      - name: Unit tests
        run: python -m unittest discover -s tests
